services:
  php:
    container_name: pulse_php
    build: ./docker/php
    volumes:
      - .:/var/www:delegated
    depends_on:
      - database
    networks:
      - pulse_network

  nginx:
    container_name: pulse_nginx
    build: ./docker/nginx
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/public:delegated
    depends_on:
      - php
    networks:
      - pulse_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: pulse_phpmyadmin
    restart: always
    ports:
      - 8081:80
    environment:
      PMA_HOST: pulse_db
      PMA_PORT: 3306
    depends_on:
      - database
    networks:
      - pulse_network

  database:
    image: mysql:latest
    container_name: pulse_db
    restart: always
    environment:
      MYSQL_DATABASE: pulse_db
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - pulse_db:/var/lib/mysql:rw
    networks:
      - pulse_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: pulse_mailpit
    ports:
      - "8025:8025"  # Interface web
      - "1025:1025"  # Serveur SMTP
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - pulse_network

  messenger_worker:
    container_name: pulse_messenger_worker
    build: ./docker/php
    depends_on:
      - database
      - mailpit
    volumes:
      - .:/var/www:delegated
    command: php bin/console messenger:consume async --no-interaction
    networks:
      - pulse_network


networks:
  pulse_network:

volumes:
  pulse_db: